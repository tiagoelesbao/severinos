# WF-001: Pipeline de Conteúdo Viral e Distribuição Omnichannel
# Duration: Contínuo (Ciclo Semanal)
# Best for: Criação de conteúdo em massa com alta retenção e brand building
# Key Agents: @marketing-chief, @mrbeast-mk, @garyvee-mk, @ezra-firestone

workflow:
  id: wf-viral-content-pipeline
  name: "Pipeline de Conteúdo Viral e Distribuição Omnichannel"
  version: "1.0"
  orchestrator: "marketing-chief"
  duration: "Contínuo"
  description: |
    Este workflow orquestra a criação de conteúdo focado em viralidade (MrBeast), 
    sua distribuição em múltiplos canais nativos (GaryVee) e a amplificação estratégica 
    através de tráfego pago de awareness (Ezra Firestone).

    Este workflow produz:
    - Conceitos virais de alto impacto
    - Briefings de thumbnails e ganchos (Hooks)
    - Calendário de distribuição nativo por plataforma
    - Campanhas de boosting de conteúdo orgânico validado

  best_for:
    - "Construção de audiência massiva no YouTube e Instagram"
    - "Lançamentos baseados em conteúdo viral"
    - "Posicionamento de marca pessoal de fundadores"

  decision_matrix_fit:
    awareness: "High"
    sophistication: "Advanced"
    price_point: "Scalable"
    traffic_temp: "Cold to Warm"
    primary_output: "Attention & Retention"

  clone_combinations:
    primary: "mrbeast-mk, garyvee-mk"
    secondary:
      - "ezra-firestone"
      - "marketing-chief"

# ═══════════════════════════════════════════════════════════════════════════════
# PHASE 1: Ideação e Engenharia de Viralidade (Days 1-2)
# ═══════════════════════════════════════════════════════════════════════════════
phases:
  - id: PHASE-1
    name: "Ideação e Engenharia de Viralidade"
    days: "1-2"
    tier: 1
    description: |
      Fase focada em encontrar o conceito que "para o scroll". O foco é 100% em 
      CTR (clique) e Retenção (visualização completa).

    tasks:
      - task_file: mrbeast-viral-framework.md
        agent: mrbeast-mk
        required: true
        description: "Aplica o framework viral para definir conceito, título e thumbnail."
        output: "viral-concept-brief.md"

    checkpoint:
      criteria:
        - "O conceito é explicável em 1 frase e gera curiosidade imediata?"
        - "O thumbnail possui contraste e emoção clara?"
        - "O título gera uma lacuna de curiosidade (Curiosity Gap)?"
      human_review: true
      message: "Revisar conceito viral antes da produção/distribuição."

# ═══════════════════════════════════════════════════════════════════════════════
# PHASE 2: Distribuição Nativa e Omnichannel (Days 3-5)
# ═══════════════════════════════════════════════════════════════════════════════
  - id: PHASE-2
    name: "Distribuição Nativa e Omnichannel"
    days: "2-3"
    tier: 1
    description: |
      Transforma o conteúdo principal em dezenas de peças fatiadas para 
      cada plataforma, respeitando a linguagem nativa.

    tasks:
      - task_file: garyvee-content-calendar.md
        agent: garyvee-mk
        required: true
        description: "Cria o calendário de postagens Jab, Jab, Jab, Right Hook."
        output: "content-distribution-plan.md"

    checkpoint:
      criteria:
        - "As legendas foram adaptadas para cada rede social?"
        - "A frequência de postagem é suficiente para dominar a atenção?"
        - "Existe equilíbrio entre valor (Jab) e venda (Hook)?"
      human_review: true
      message: "Validar calendário nativo por plataforma."

# ═══════════════════════════════════════════════════════════════════════════════
# PHASE 3: Amplificação Estratégica (Days 6-7)
# ═══════════════════════════════════════════════════════════════════════════════
  - id: PHASE-3
    name: "Amplificação Estratégica"
    days: "1"
    tier: 1
    description: |
      Usa o tráfego pago para impulsionar o que já está funcionando no orgânico, 
      construindo audiência de retargeting qualificada.

    tasks:
      - task_file: ezra-brand-campaign-create.md
        agent: ezra-firestone
        required: true
        description: "Configura o boosting de posts com CTR > 3%."
        output: "boosting-campaign-status.md"

    checkpoint:
      criteria:
        - "Apenas conteúdos com performance orgânica validada foram impulsionados?"
        - "O pixel de retargeting está capturando a audiência de ThruPlay?"
      human_review: false
      message: "Monitorar performance do boosting."

# ═══════════════════════════════════════════════════════════════════════════════
# ERROR HANDLING
# ═══════════════════════════════════════════════════════════════════════════════
error_handling:
  on_phase_failure:
    - log_error: true
    - notify_stakeholders: true
    - create_remediation_task: true
    - halt_workflow: true

  on_checkpoint_failure:
    - log_failure_reason: true
    - return_to_previous_phase: true
    - max_retries: 2

# ═══════════════════════════════════════════════════════════════════════════════
# COMPLETION SIGNALS
# ═══════════════════════════════════════════════════════════════════════════════
completion_signal: "<promise>COMPLETE:VIRAL-PIPELINE</promise>"
checkpoint_signal: "<promise>CHECKPOINT:PHASE-{{phase_id}}</promise>"
blocked_signal: "<promise>BLOCKED:VIRAL-GARGALO</promise>"

# ═══════════════════════════════════════════════════════════════════════════════
# OUTPUT ARTIFACTS
# ═══════════════════════════════════════════════════════════════════════════════
outputs:
  Ideação:
    - "Briefing de Vídeo Viral"
    - "Mockup de Thumbnail"
  Distribuição:
    - "Calendário Semanal Omnichannel"
    - "Copy de Legendas Nativas"
  Tráfego:
    - "Campanhas de Boosting Ativas"
    - "Audiências de Retargeting de Vídeo"

# ═══════════════════════════════════════════════════════════════════════════════
# QUALITY CHECKLIST
# ═══════════════════════════════════════════════════════════════════════════════
quality_checklist:
  Fase de Ideação:
    - "[ ] Thumbnail passa no teste de 3 segundos (entendimento imediato)"
    - "[ ] Título contém gatilho de curiosidade ou benefício claro"
  Fase de Distribuição:
    - "[ ] Conteúdo fatiado em pelo menos 15 peças"
    - "[ ] Vídeos de TikTok/Reels têm hooks nativos (sem intro)"
  Fase de Tráfego:
    - "[ ] Audiência de retargeting crescendo conforme o esperado"

# ═══════════════════════════════════════════════════════════════════════════════
# GOVERNANCE GATE
# ═══════════════════════════════════════════════════════════════════════════════
governance_gate:
  protocol: "squads/squad-creator/protocols/ai-first-governance.md"
  required_checks:
    - "Existing Content -> Gap Analysis -> Decision mapped"
    - "Canonical MrBeast/GaryVee sources validated"

  ci_policy:
    blocking_deterministic_only: true
    deterministic_checks:
      - "syntax/schema"
      - "broken references"
      - "required tasks presence"
    semantic_checks_enforced_in_workflow: true

# ═══════════════════════════════════════════════════════════════════════════════
# METADATA
# ═══════════════════════════════════════════════════════════════════════════════
metadata:
  version: "1.0"
  framework: "Virals Viral Pipeline v1"
  created: "2026-03-12"
  primary_use_case: "Social Media Dominance"
